name: Deploy Skywatch

on:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build frontend image
      run: |
        docker build \
        -t ghcr.io/adigershom/skywatch-frontend:${{ github.sha }} \
        ./app/frontend


    - name: Push frontend image
      run: |
        docker push \
        ghcr.io/adigershom/skywatch-frontend:${{ github.sha }}


    - name: Build worker image
      run: |
        docker build \
        -t ghcr.io/adigershom/skywatch-worker:${{ github.sha }} \
        ./app/worker


    - name: Push worker image
      run: |
        docker push \
        ghcr.io/adigershom/skywatch-worker:${{ github.sha }}