name: Deploy Skywatch

on:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build frontend image
      run: |
        docker build \
        -t ghcr.io/adigershom/skywatch-frontend:${{ github.sha }} \
        ./app/frontend


    - name: Push frontend image
      run: |
        docker push \
        ghcr.io/adigershom/skywatch-frontend:${{ github.sha }}


    - name: Build worker image
      run: |
        docker build \
        -t ghcr.io/adigershom/skywatch-worker:${{ github.sha }} \
        ./app/worker


    - name: Push worker image
      run: |
        docker push \
        ghcr.io/adigershom/skywatch-worker:${{ github.sha }}

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
        --name skywatch-eks \
        --region eu-west-1

    - name: Deploy Helm
      run: |
        helm upgrade --install skywatch ./helm/skywatch \
        --set frontend.image.tag=${{ github.sha }} \
        --set worker.image.tag=${{ github.sha }}